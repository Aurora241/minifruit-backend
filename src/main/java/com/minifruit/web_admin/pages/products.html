<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MiniFruit — Sản phẩm</title>
    <link rel="stylesheet" href="../css/style.css?v=4">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🍎</div>
            <span>MiniFruit</span>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" id="avatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="display-name">Admin</div>
                    <div class="user-role" id="display-role">ADMIN</div>
                </div>
                <button class="btn-logout" onclick="logout()">⏻</button>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">Sản phẩm</div>
            <div class="topbar-actions">
                <button class="btn btn-primary" onclick="openModal()">+ Thêm sản phẩm</button>
            </div>
        </div>
        <div class="page-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Danh sách sản phẩm</div>
                    <div class="search-bar">
                        <span>🔍</span>
                        <input type="text" id="search" placeholder="Tìm sản phẩm..." oninput="filterProducts()">
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Tên sản phẩm</th>
                            <th>Danh mục</th>
                            <th>Giá nhập</th>
                            <th>Giá bán</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody id="products-table">
                        <tr><td colspan="7"><div class="empty-state"><div class="icon">⏳</div><p>Đang tải...</p></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Thêm sản phẩm</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="product-id">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">SKU *</label>
                    <input class="form-control" id="sku" placeholder="VD: SP001">
                </div>
                <div class="form-group">
                    <label class="form-label">Barcode</label>
                    <input class="form-control" id="barcode" placeholder="Mã vạch">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Tên sản phẩm *</label>
                <input class="form-control" id="product-name" placeholder="Tên sản phẩm">
            </div>
            <div class="form-group">
                <label class="form-label">Danh mục</label>
                <select class="form-control" id="category-id">
                    <option value="">-- Chọn danh mục --</option>
                </select>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Giá nhập (đ)</label>
                    <input class="form-control" type="number" id="cost-price" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Giá bán (đ)</label>
                    <input class="form-control" type="number" id="selling-price" placeholder="0">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
            <button class="btn btn-primary" onclick="saveProduct()">Lưu</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="../js/auth.js?v=3"></script>
<script src="../js/api.js?v=3"></script>
<script>
    requireAuth();
    buildSidebar();
    initUser();

    let allProducts = [];

    function toast(msg, type = 'success') {
        const c = document.getElementById('toasts');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${msg}`;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadProducts() {
        const [products, categories] = await Promise.all([
            api.get('/products'),
            api.get('/categories')
        ]);
        allProducts = products || [];
        const sel = document.getElementById('category-id');
        sel.innerHTML = '<option value="">-- Chọn danh mục --</option>';
        (categories || []).forEach(c => {
            sel.innerHTML += `<option value="${c.categoryId}">${c.categoryName}</option>`;
        });
        renderTable(allProducts);
    }

    function renderTable(data) {
        const tbody = document.getElementById('products-table');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">📭</div><p>Chưa có sản phẩm nào</p></div></td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(p => `
            <tr>
                <td><code>${p.sku}</code></td>
                <td><strong>${p.productName}</strong></td>
                <td>${p.category?.categoryName ?? '—'}</td>
                <td>${Number(p.costPrice).toLocaleString('vi-VN')}đ</td>
                <td><strong>${Number(p.sellingPrice).toLocaleString('vi-VN')}đ</strong></td>
                <td><span class="badge ${p.status ? 'badge-success' : 'badge-danger'}">${p.status ? 'Hoạt động' : 'Ngừng'}</span></td>
                <td>
                    <button class="btn btn-outline btn-sm" onclick="editProduct(${p.productId})">✏️ Sửa</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.productId})">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function filterProducts() {
        const q = document.getElementById('search').value.toLowerCase();
        renderTable(allProducts.filter(p =>
            p.productName.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)
        ));
    }

    function openModal(reset = true) {
        if (reset) {
            document.getElementById('modal-title').textContent = 'Thêm sản phẩm';
            ['product-id','sku','barcode','product-name','cost-price','selling-price'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('category-id').value = '';
        }
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function editProduct(id) {
        const p = allProducts.find(x => x.productId === id);
        if (!p) return;
        document.getElementById('modal-title').textContent = 'Sửa sản phẩm';
        document.getElementById('product-id').value = p.productId;
        document.getElementById('sku').value = p.sku;
        document.getElementById('barcode').value = p.barcode || '';
        document.getElementById('product-name').value = p.productName;
        document.getElementById('cost-price').value = p.costPrice;
        document.getElementById('selling-price').value = p.sellingPrice;
        document.getElementById('category-id').value = p.category?.categoryId || '';
        openModal(false);
    }

    async function saveProduct() {
        const id = document.getElementById('product-id').value;
        const body = {
            sku: document.getElementById('sku').value,
            barcode: document.getElementById('barcode').value,
            productName: document.getElementById('product-name').value,
            costPrice: document.getElementById('cost-price').value,
            sellingPrice: document.getElementById('selling-price').value,
            categoryId: document.getElementById('category-id').value || null,
        };
        if (!body.sku || !body.productName) { toast('Vui lòng nhập SKU và tên sản phẩm', 'error'); return; }
        if (id) {
            await api.put(`/products/${id}`, body);
            toast('Đã cập nhật sản phẩm');
        } else {
            await api.post('/products', body);
            toast('Đã thêm sản phẩm');
        }
        closeModal();
        loadProducts();
    }

    async function deleteProduct(id) {
        if (!confirm('Xóa sản phẩm này?')) return;
        await api.delete(`/products/${id}`);
        toast('Đã xóa sản phẩm');
        loadProducts();
    }

    loadProducts();
</script>
</body>
</html>
