<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniFruit — Đăng nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">🍎</div>
            <h1>MiniFruit</h1>
            <p>Hệ thống quản lý kho & bán hàng</p>
        </div>
        <div class="alert alert-danger" id="error-msg"></div>
        <div class="form-group">
            <label class="form-label">Tên đăng nhập</label>
            <input class="form-control" type="text" id="username" placeholder="Nhập tên đăng nhập">
        </div>
        <div class="form-group">
            <label class="form-label">Mật khẩu</label>
            <input class="form-control" type="password" id="password" placeholder="Nhập mật khẩu">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px"
                id="btn-login" onclick="doLogin()">
            Đăng nhập
        </button>
    </div>
</div>
<script src="js/auth.js"></script>
<script>
    // Thêm dòng này vào đầu script của index.html
    localStorage.setItem('loginUrl', window.location.href);
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

    async function doLogin() {
        const btn = document.getElementById('btn-login');
        const err = document.getElementById('error-msg');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            err.textContent = 'Vui lòng nhập đầy đủ thông tin';
            err.classList.add('show'); return;
        }

        btn.innerHTML = '<span class="spinner"></span> Đang đăng nhập...';
        btn.disabled = true;

        try {
            const res = await fetch('https://minifruit-backend-production-f318.up.railway.app/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                saveAuth(data);
                window.location.href = 'dashboard.html';
            } else {
                err.textContent = data || 'Sai tên đăng nhập hoặc mật khẩu';
                err.classList.add('show');
            }
        } catch (e) {
            err.textContent = 'Không kết nối được server';
            err.classList.add('show');
        }

        btn.innerHTML = 'Đăng nhập';
        btn.disabled = false;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>
