<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniFruit — Dashboard</title>
    <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🍎</div>
            <span>MiniFruit</span>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" id="avatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="display-name">Admin</div>
                    <div class="user-role" id="display-role">ADMIN</div>
                </div>
                <button class="btn-logout" onclick="logout()" title="Đăng xuất">⏻</button>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">Dashboard</div>
        </div>
        <div class="page-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green">🛒</div>
                    <div>
                        <div class="stat-value" id="stat-products">—</div>
                        <div class="stat-label">Sản phẩm</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">🏪</div>
                    <div>
                        <div class="stat-value" id="stat-branches">—</div>
                        <div class="stat-label">Chi nhánh</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon amber">👥</div>
                    <div>
                        <div class="stat-value" id="stat-users">—</div>
                        <div class="stat-label">Người dùng</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">⚠️</div>
                    <div>
                        <div class="stat-value" id="stat-lowstock">—</div>
                        <div class="stat-label">Sắp hết hàng</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">🧾 Hóa đơn gần đây</div>
                    <a href="pages/orders.html" class="btn btn-outline btn-sm">Xem tất cả</a>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Chi nhánh</th>
                            <th>Nhân viên</th>
                            <th>Tổng tiền</th>
                            <th>Thanh toán</th>
                            <th>Thời gian</th>
                        </tr>
                        </thead>
                        <tbody id="orders-table">
                        <tr><td colspan="6"><div class="empty-state"><div class="icon">⏳</div><p>Đang tải...</p></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/auth.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script>
    requireAuth();
    buildSidebar();
    initUser();

    async function loadDashboard() {
        const [products, branches, users] = await Promise.all([
            api.get('/products'),
            api.get('/branches'),
            api.get('/users'),
        ]);
        document.getElementById('stat-products').textContent = products?.length ?? 0;
        document.getElementById('stat-branches').textContent = branches?.length ?? 0;
        document.getElementById('stat-users').textContent = users?.length ?? 0;

        if (branches?.length > 0) {
            const lowStock = await api.get(`/inventory/low-stock/${branches[0].branchId}`);
            document.getElementById('stat-lowstock').textContent = lowStock?.length ?? 0;

            const orders = await api.get(`/orders/branch/${branches[0].branchId}`);
            const tbody = document.getElementById('orders-table');
            if (!orders?.length) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><p>Chưa có hóa đơn</p></div></td></tr>`;
                return;
            }
            tbody.innerHTML = orders.slice(0, 8).map(o => `
                <tr>
                    <td>#${o.orderId}</td>
                    <td>${o.branch?.branchName ?? '—'}</td>
                    <td>${o.user?.fullName ?? o.user?.username ?? '—'}</td>
                    <td><strong>${Number(o.totalAmount).toLocaleString('vi-VN')}đ</strong></td>
                    <td><span class="badge badge-info">${o.paymentMethod ?? 'CASH'}</span></td>
                    <td>${new Date(o.createdAt).toLocaleString('vi-VN')}</td>
                </tr>
            `).join('');
        }
    }

    loadDashboard();
</script>
</body>
</html>
